name: agentspec
description: AgentSpec - Spec-Driven Data Engineering for GitHub Copilot CLI (66 agents, 41 skills, 30 KB domains)
version: 1.0.0
author: Arthur1511
license: MIT
repository: https://github.com/Arthur1511/agentspec-copilot

# Copilot CLI extension metadata
extension:
  type: agent-library
  platform: github-copilot-cli
  min_copilot_version: "1.0.0"

# AgentSpec metadata
agentspec:
  version: "3.3.0"
  agents: 66
  kb_domains: 30
  skills: 41
  cognitive_framework:
    - kb_first
    - confidence_scored
    - escalation_aware
    - quality_gated

# Categories
categories:
  workflow:
    agents: 6
    skills: 7
    description: SDD workflow agents and commands
  data_engineering:
    agents: 15
    skills: 9
    description: Data engineering specialists
  data_science:
    agents: 8
    skills: 5
    description: Data science and ML specialists
  architect:
    agents: 8
    description: System design architects
  cloud:
    agents: 10
    description: AWS, GCP, and cloud specialists
  platform:
    agents: 6
    description: Microsoft Fabric specialists
  python:
    agents: 6
    description: Python development specialists
  test:
    agents: 3
    description: QA and testing specialists
  dev:
    agents: 4
    description: Developer tools specialists

# Installation instructions
install:
  command: copilot plugin install Arthur1511/agentspec-copilot:plugin-copilot
  update: copilot plugin update agentspec
  uninstall: copilot plugin remove agentspec
  local: copilot plugin install ./plugin-copilot

# Quick start
quickstart: |
  Install: copilot plugin install Arthur1511/agentspec-copilot:plugin-copilot
  Usage: /agentspec:brainstorm "Daily orders pipeline from Postgres to Snowflake"
