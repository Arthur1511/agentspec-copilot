name: Validate Plugin

on:
  push:
    branches: [ main ]
    paths:
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/kb/**"
      - ".github/sdd/templates/**"
      - ".github/sdd/architecture/**"
      - ".github/manifest.yaml"
      - "build-copilot.sh"
      - "build-copilot.ps1"
      - ".claude-plugin/**"
      - ".github/plugin/**"
      - "plugin-copilot/hooks/**"
      - "plugin-copilot/scripts/**"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/kb/**"
      - ".github/sdd/templates/**"
      - ".github/sdd/architecture/**"
      - ".github/manifest.yaml"
      - "build-copilot.sh"
      - "build-copilot.ps1"
      - ".claude-plugin/**"
      - ".github/plugin/**"
      - "plugin-copilot/hooks/**"
      - "plugin-copilot/scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # - name: Validate plugin.json
      #   run: |
      #     echo "Checking plugin.json syntax..."
      #     python3 -c "
      #     import json, sys
      #     with open('.copilot-plugin/plugin.json') as f:
      #         data = json.load(f)
      #     required = ['name', 'version', 'description']
      #     missing = [k for k in required if k not in data]
      #     if missing:
      #         print(f'Missing required fields: {missing}')
      #         sys.exit(1)
      #     print(f'Valid: {data[\"name\"]} v{data[\"version\"]}')
      #     "

      - name: Validate marketplace.json
        run: |
          echo "Checking marketplace.json syntax..."
          python3 -c "
          import json
          with open('.github/plugin/marketplace.json') as f:
              data = json.load(f)
          assert 'name' in data, 'Missing top-level name field'
          assert 'owner' in data, 'Missing top-level owner field'
          assert 'name' in data['owner'], 'Owner missing name'
          assert 'email' in data['owner'], 'Owner missing email'
          assert 'plugins' in data, 'Missing plugins array'
          for p in data['plugins']:
              assert 'name' in p, 'Plugin entry missing name'
          print(f'Valid: {data[\"name\"]} with {len(data[\"plugins\"])} plugin(s)')
          "

      - name: Build plugin
        run: bash build-copilot.sh

      - name: Check for stale paths
        run: |
          echo "Checking for unrewritten .github/ paths in plugin-copilot/ output..."
          STALE=$(grep -r '\.github/' plugin-copilot/ \
            --include="*.md" --include="*.yaml" --include="*.yml" \
            | grep -v 'COPILOT_PLUGIN_ROOT' \
            | grep -v '\.github/sdd/features' \
            | grep -v '\.github/sdd/reports' \
            | grep -v '\.github/sdd/archive' \
            | grep -v '\.github/sdd/' \
            | grep -v '\.github/storage' \
            | grep -v '\.github/workflows/' \
            | grep -v '\.github/commands/' \
            | grep -v '\.github/copilot-instructions' \
            | grep -v '\.github/CLAUDE\.md' \
            | grep -v '\.github/\*\*' \
            | grep -v '^[[:space:]]*#' \
            | grep -v '├── \.github' \
            || true)

          if [ -n "$STALE" ]; then
            echo "::error::Found unrewritten .github/ references in plugin-copilot/ output:"
            echo "$STALE" | head -20
            exit 1
          fi

      - name: Verify agent count
        run: |
          COUNT=$(find plugin-copilot/agents -name "*.agent.md" | wc -l)
          echo "Agents found: $COUNT"
          if [ "$COUNT" -lt 50 ]; then
            echo "::error::Expected 50+ agents, found $COUNT"
            exit 1
          fi

      - name: Verify skill count
        run: |
          COUNT=$(find plugin-copilot/skills -name "SKILL.md" | wc -l)
          echo "Skills found: $COUNT"
          if [ "$COUNT" -lt 4 ]; then
            echo "::error::Expected 4+ skills, found $COUNT"
            exit 1
          fi

      - name: Verify KB domain count
        run: |
          COUNT=$(find plugin-copilot/kb -maxdepth 1 -type d ! -name "kb" ! -name "_templates" ! -name "shared" | wc -l)
          echo "KB domains found: $COUNT"
          if [ "$COUNT" -lt 20 ]; then
            echo "::error::Expected 20+ KB domains, found $COUNT"
            exit 1
          fi

      - name: Verify hooks and scripts
        run: |
          echo "Checking hooks..."
          python3 -c "import json; json.load(open('plugin-copilot/hooks/hooks.json'))"
          echo "Checking init script..."
          test -f plugin-copilot/scripts/init-workspace.sh || { echo "::error::init-workspace.sh not found"; exit 1; }
          echo "All checks passed"
